<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Space Invaders</title>

    <link rel="stylesheet"
          href="game.css">

</head>

<body>

    <div id="hud">

        <div id="score">

    <div id="countdown">
            3

    <script src="game.js"></script>

</html>
